name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: node:14.21.3-bullseye
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y python2 build-essential

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        env:
          PYTHON: /usr/bin/python2

      - name: Downgrade all undici copies to Node 14 compatible version
        run: |
          find node_modules -type d -name undici | while read dir; do
            echo "Replacing $dir"
            rm -rf "$dir"
            mkdir -p "$dir"
            cd "$dir"
            npm pack undici@4.16.0 --quiet 2>/dev/null
            tar xzf undici-4.16.0.tgz --strip-components=1
            rm -f undici-4.16.0.tgz
            cd -
          done

      - name: Build with Gatsby
        run: npx gatsby build --prefix-paths
        env:
          PREFIX_PATHS: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
